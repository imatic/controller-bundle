imports:
    - { resource: "@ImaticDataBundle/config/data_doctrine.yaml" }
    - { resource: "@ImaticDataBundle/config/data_doctrine_orm.yaml" }
    - { resource: "@ImaticControllerBundle/Resources/config/config.yml" }
    - { resource: "resources/user.yml" }

parameters:
    env(TESTING_DATA_INIT): '1'

    testing.data_init: '%env(TESTING_DATA_INIT)%'

framework:
    secret:                     test
    test: ~
    session:
        storage_factory_id:     session.storage.factory.mock_file
    form:                       true
    csrf_protection:            true
    validation:
        enabled:                true
    translator:
        enabled:                true
    router:
        utf8:                   true
        resource:               "%kernel.project_dir%/config/routing.yml"
    default_locale:             cs_CZ
    profiler:
        only_exceptions:            false
        collect_serializer_data:    true
    property_info:
        with_constructor_extractor: true

web_profiler:
    toolbar: true

twig:
    debug:                      "%kernel.debug%"
    strict_variables:           "%kernel.debug%"

doctrine:
    dbal:
        connections:
            default:
                driver:         pdo_sqlite
                memory:         false
                path:           "%kernel.project_dir%/var/cache/test.db"

    orm:
        auto_generate_proxy_classes: "%kernel.debug%"
        auto_mapping:           true
        report_fields_where_declared: true
        resolve_target_entities: []
        mappings:
            ImaticControllerBundle:
                type: attribute
                dir: '%kernel.project_dir%/ImaticControllerBundle/Entity'
                prefix: 'Imatic\Bundle\ControllerBundle\Tests\Fixtures\TestProject\ImaticControllerBundle\Entity'
                alias: ImaticControllerBundle

monolog:
    handlers:
        main:
            type: "null"
            process_psr_3_messages: false

security:
    password_hashers:
        Symfony\Component\Security\Core\User\User: plaintext
        Symfony\Component\Security\Core\User\InMemoryUser: plaintext

    role_hierarchy:
        ROLE_ADMIN:             ROLE_USER
        ROLE_SUPER_ADMIN:       [ROLE_USER, ROLE_ADMIN, ROLE_ALLOWED_TO_SWITCH]

    providers:
        in_memory:
            memory:
                users:
                    user:
                        password: password
                        roles:  [ROLE_SUPER_ADMIN]

    firewalls:
        main:
            provider:           in_memory
            context:            user
            pattern:            /
            http_basic:

    access_control:
        - { path: ^/admin, role: [ROLE_ADMIN] }

imatic_data:
    pager:
        default_limit: 20

services:
    _defaults:
        public: true
